name: Gerar APK PortoMicro CRM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo fonte
        uses: actions/checkout@v4

      - name: Configurar Java SDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter Local
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true

      - name: Limpar cache do projeto
        run: flutter clean

      - name: Baixar dependencias do pubspec
        run: flutter pub get

      # CORREÇÃO DO ERRO: Modifica os arquivos de configuração do Gradle nativo na memória do servidor
      - name: Corrigir versao do Kotlin no ambiente de build
        run: |
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/' android/build.gradle
            sed -i 's/ext.kotlin_version=.*/ext.kotlin_version = "1.9.24"/' android/build.gradle
          fi
          if [ -f android/settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.24" apply false/' android/settings.gradle
          fi

      - name: Compilar APK original
        run: flutter build apk --release

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: PortoMicro-CRM-APK
          path: build/app/outputs/flutter-apk/app-release.apk
