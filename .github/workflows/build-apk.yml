name: Gerar APK PortoMicro CRM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo fonte
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Limpar cache do projeto
        run: flutter clean

      - name: Baixar dependencias do pubspec
        run: flutter pub get

      # CORREÇÃO DO ERRO: Atualiza a versão do Kotlin nativo antes de compilar
      - name: Corrigir versao do Kotlin no Gradle
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/' android/build.gradle
          sed -i 's/ext.kotlin_version =.*/ext.kotlin_version = "1.9.24"/' android/build.gradle

      - name: Compilar APK original
        run: flutter build apk --release

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: PortoMicro-CRM-APK
          path: build/app/outputs/flutter-apk/app-release.apk
