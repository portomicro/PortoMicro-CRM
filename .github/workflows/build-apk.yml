name: Gerar APK PortoMicro CRM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo fonte
        uses: actions/checkout@v4

      - name: Configurar Java SDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter de Estabilidade
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      - name: Limpar cache do projeto
        run: flutter clean

      - name: Baixar dependencias do pubspec
        run: flutter pub get

      # CORREÇÃO DEFINITIVA: Cria a MainActivity correta direto na memória do servidor
      - name: Corrigir MainActivity do Android
        run: |
          mkdir -p android/app/src/main/kotlin/com/flutex/admin
          cat << 'EOF' > android/app/src/main/kotlin/com/flutex/admin/MainActivity.kt
          package com.flutex.admin

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

      - name: Compilar APK original
        run: flutter build apk --release

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: PortoMicro-CRM-APK
          path: build/app/outputs/flutter-apk/app-release.apk
