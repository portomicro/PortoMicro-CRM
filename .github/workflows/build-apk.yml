name: Gerar APK PortoMicro CRM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo fonte
        uses: actions/checkout@v4

      - name: Configurar Java SDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter de Estabilidade
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Versão compatível que aceita o Kotlin original do projeto
          cache: true

      - name: Limpar cache do projeto
        run: flutter clean

      - name: Baixar dependencias do pubspec
        run: flutter pub get

      - name: Compilar APK original
        run: flutter build apk --release

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: PortoMicro-CRM-APK
          path: build/app/outputs/flutter-apk/app-release.apk
